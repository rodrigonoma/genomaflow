# Hosts:
#   genomaflow.com.br / www.genomaflow.com.br → SOMENTE landing
#     - / serve apps/landing/index.html
#     - assets da landing (logo, vídeos, /landing/*)
#     - qualquer outro path → 301 pra https://app.genomaflow.com.br$request_uri
#       (preserva bookmarks antigos tipo /clinic/dashboard)
#   app.genomaflow.com.br → Angular SPA (try_files fallback /index.html)
#
# /api/* não chega aqui — ALB rule encaminha pra API target group antes.
# /health responde 200 em qualquer host (ALB target group health check).

# ── Apex + www: só landing ───────────────────────────────────────────────
server {
    listen 80;
    server_name genomaflow.com.br www.genomaflow.com.br;
    root /usr/share/nginx/html/landing;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Redirect HTTP → HTTPS (TLS termina no ALB; X-Forwarded-Proto vem dele)
    if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

    # Health check (ALB)
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Landing root
    location = / { try_files /index.html =404; }
    location = /index.html { try_files /index.html =404; }

    # Assets da landing (raiz)
    location = /logo_genoma.png { alias /usr/share/nginx/html/landing/logo_genoma.png; expires 7d; }

    location ^~ /videos/ {
        alias /usr/share/nginx/html/landing/videos/;
        add_header Cache-Control "public, max-age=86400";
        add_header Accept-Ranges bytes;
    }

    location ^~ /landing/ {
        alias /usr/share/nginx/html/landing/;
        try_files $uri $uri/ /landing/index.html;
    }

    # Qualquer outro path no apex/www → redirect pro app subdomain.
    # Cobre bookmarks antigos como /clinic/dashboard, /login, /onboarding etc.
    location / {
        return 301 https://app.genomaflow.com.br$request_uri;
    }
}

# ── app.genomaflow.com.br: Angular SPA ───────────────────────────────────
server {
    listen 80;
    server_name app.genomaflow.com.br;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    if ($http_x_forwarded_proto = "http") { return 301 https://$host$request_uri; }

    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # JS/CSS/assets do Angular — cache longo (hashed pelo build)
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Angular SPA — fallback pra index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
