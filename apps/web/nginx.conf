server {
  listen 80;
  server_name www.genomaflow.com.br;

  root /usr/share/nginx/landing;
  index index.html;

  # Redirect HTTP to HTTPS when behind ALB
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  location / {
    try_files $uri $uri/ =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;
  }
}

server {
  listen 80 default_server;
  root /usr/share/nginx/html;

  # Redirect HTTP to HTTPS when behind ALB
  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  # JS/CSS/assets do Angular: cache longo (hash no nome invalida automaticamente).
  # Se o arquivo NÃO existir (ex: usuário com aba antiga pedindo chunk-OLD.js),
  # retorna 404 em vez de fallback pra index.html — senão o browser tenta parsear
  # HTML como JS e quebra tudo silenciosamente (incidente 2026-04-24).
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|map)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # index.html NUNCA cacheada — garante que o usuário sempre pega a referência
  # mais recente do main-[hash].js após cada deploy.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;
  }

  # Angular SPA fallback (rotas client-side)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
