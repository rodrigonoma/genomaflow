# Hosts (split desde 2026-04-27):
#   genomaflow.com.br / www.genomaflow.com.br → SOMENTE landing
#     - / serve /usr/share/nginx/landing/index.html
#     - assets da landing (logo, vídeos)
#     - qualquer outro path → 301 pra https://app.genomaflow.com.br$request_uri
#       (preserva bookmarks antigos tipo /clinic/dashboard, /login)
#   app.genomaflow.com.br → Angular SPA com caching certo
#     - chunk-*.js / *.css que não existem → 404 (NÃO fallback pra index.html,
#       senão browser parseia HTML como JS — incidente 2026-04-24)
#     - index.html sempre no-cache (deploy invalida main-[hash].js)
#     - rotas SPA → fallback pra /index.html
#
# /api/* não chega aqui — ALB rule encaminha pra API target group antes.
# /health responde 200 em qualquer host (ALB target group health check).

# ── Apex + www: SOMENTE landing + redirect catch-all pro app ──────────────
server {
  listen 80;
  server_name genomaflow.com.br www.genomaflow.com.br;
  root /usr/share/nginx/landing;
  index index.html;

  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # Landing
  location = / {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;
  }
  location = /index.html {
    try_files /index.html =404;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;
  }

  # Assets da landing
  location = /logo_genoma.png { try_files /logo_genoma.png =404; expires 7d; }
  location ^~ /videos/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=86400";
    add_header Accept-Ranges bytes;
  }
  location ^~ /landing/ {
    alias /usr/share/nginx/landing/;
    try_files $uri $uri/ /landing/index.html;
  }

  # Qualquer outro path → 308 pro app subdomain (Permanent Redirect).
  # 308 preserva método e body (vs 301 que pode converter POST→GET em alguns
  # clients HTTP/1.1). Importante pra webhooks externos eventualmente
  # configurados pro apex (ex: /api/integrations/:id/ingest), bookmarks
  # tipo /clinic/dashboard (GET), e links de email.
  location / {
    return 308 https://app.genomaflow.com.br$request_uri;
  }
}

# ── app.genomaflow.com.br: Angular SPA ────────────────────────────────────
server {
  listen 80 default_server;
  server_name app.genomaflow.com.br;
  root /usr/share/nginx/html;

  if ($http_x_forwarded_proto = "http") {
    return 301 https://$host$request_uri;
  }

  location = /health {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # JS/CSS/assets do Angular: cache longo (hash no nome invalida automaticamente).
  # Se o arquivo NÃO existir (ex: usuário com aba antiga pedindo chunk-OLD.js),
  # retorna 404 em vez de fallback pra index.html — senão o browser tenta parsear
  # HTML como JS e quebra tudo silenciosamente (incidente 2026-04-24).
  location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|ico|webp|map)$ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # index.html NUNCA cacheada — garante que o usuário sempre pega a referência
  # mais recente do main-[hash].js após cada deploy.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    expires 0;
  }

  # Angular SPA fallback (rotas client-side)
  location / {
    try_files $uri $uri/ /index.html;
  }
}
