name: Deploy Mobile (Android + iOS)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (mobile)
        run: npx ng build --configuration=mobile

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Android Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/genomaflow-release.keystore
          else
            echo "No keystore secret — building with debug signing"
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android AAB
        working-directory: apps/web/android
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: app/genomaflow-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: genomaflow
          KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Setup Ruby + Fastlane
        if: ${{ secrets.GOOGLE_PLAY_JSON_KEY != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/web/android

      - name: Upload to Play Store (internal track)
        if: ${{ secrets.GOOGLE_PLAY_JSON_KEY != '' }}
        working-directory: apps/web/android
        run: bundle exec fastlane supply
        env:
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (mobile)
        run: npx ng build --configuration=mobile

      - name: Init iOS project (first run)
        run: npx cap add ios || true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Ruby + Fastlane
        if: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/web/ios

      - name: Install CocoaPods
        if: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID != '' }}
        working-directory: apps/web/ios/App
        run: pod install

      - name: Build + Upload to TestFlight
        if: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID != '' }}
        working-directory: apps/web/ios
        run: bundle exec fastlane beta
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
