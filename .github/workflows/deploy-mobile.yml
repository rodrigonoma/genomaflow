name: Deploy Mobile (Android + iOS)

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (mobile)
        run: npx ng build --configuration=mobile

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Android Keystore
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android/app/genomaflow-release.keystore
          else
            echo "ANDROID_KEYSTORE_BASE64 not set — AAB will use debug signing"
            touch android/app/genomaflow-release.keystore
          fi
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK (debug para sideload / release se keystore presente)
        working-directory: apps/web/android
        run: |
          if [ -n "$KEYSTORE_PASSWORD" ]; then
            ./gradlew assembleRelease
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          else
            ./gradlew assembleDebug
            APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
          fi
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
        env:
          KEYSTORE_PATH: app/genomaflow-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: genomaflow
          KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: genomaflow-android-${{ github.ref_name }}
          path: apps/web/android/${{ env.APK_PATH }}
          retention-days: 30

      - name: Build Android AAB (para Play Store)
        working-directory: apps/web/android
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PATH: app/genomaflow-release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: genomaflow
          KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/web/android

      - name: Upload to Play Store (internal track)
        working-directory: apps/web/android
        run: |
          if [ -n "$GOOGLE_PLAY_JSON_KEY_DATA" ]; then
            bundle exec fastlane supply
          else
            echo "GOOGLE_PLAY_JSON_KEY not configured — skipping Play Store upload (Task 20)"
          fi
        env:
          GOOGLE_PLAY_JSON_KEY_DATA: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Angular (mobile)
        run: npx ng build --configuration=mobile

      - name: Init iOS project
        run: |
          # Preserve custom Fastlane files, then clear ios/ so cap add ios creates
          # the full Xcode project (ios/App/Podfile etc). Without this, cap add ios
          # says "platform already exists" and skips, leaving ios/App/ empty.
          cp ios/Gemfile /tmp/Gemfile_ios 2>/dev/null || true
          cp -r ios/fastlane /tmp/fastlane_ios 2>/dev/null || true
          rm -rf ios
          npx cap add ios
          cp /tmp/Gemfile_ios ios/Gemfile 2>/dev/null || true
          cp -r /tmp/fastlane_ios ios/fastlane 2>/dev/null || true

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Setup Ruby + Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: apps/web/ios

      - name: Install CocoaPods
        working-directory: apps/web/ios/App
        run: pod install

      - name: Build + Upload to TestFlight
        working-directory: apps/web/ios
        run: |
          if [ -n "$APP_STORE_CONNECT_API_KEY_ID" ]; then
            bundle exec fastlane beta
          else
            echo "APP_STORE_CONNECT_API_KEY_ID not configured — skipping TestFlight upload (Task 20)"
          fi
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_PROVISIONING_PROFILE: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
