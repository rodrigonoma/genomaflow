name: Deploy Production

on:
  push:
    branches: [main]

jobs:
  test:
    name: Unit tests (gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Roda só testes unitários (sem DB) — falha bloqueia deploy.
      # Testes que precisam de Postgres/Redis vivos rodam localmente / em
      # ambiente dedicado; aqui o objetivo é rede de segurança barata e
      # rápida pra regressões puras de lógica.
      - name: API — install + unit tests
        working-directory: apps/api
        run: |
          npm ci --no-audit --no-fund
          npm run test:unit

      - name: Worker — install + unit tests
        working-directory: apps/worker
        run: |
          npm ci --no-audit --no-fund
          npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      - name: Build & push API
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/genomaflow/api
          docker build --build-arg CACHEBUST=${{ env.IMAGE_TAG }} -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest apps/api
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

      - name: Build & push Worker
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/genomaflow/worker
          # Build context = repo root pra docs/ + CLAUDE.md chegarem no image (usados pelo reindex do Copilot)
          docker build -f apps/worker/Dockerfile --build-arg CACHEBUST=${{ env.IMAGE_TAG }} -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest .
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

      - name: Build & push Web
        run: |
          cp -r apps/landing apps/web/landing
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/genomaflow/web
          docker build --build-arg CACHEBUST=${{ env.IMAGE_TAG }} -t $IMAGE:${{ env.IMAGE_TAG }} -t $IMAGE:latest apps/web
          docker push $IMAGE:${{ env.IMAGE_TAG }}
          docker push $IMAGE:latest

      - name: Update ECS task definitions and deploy
        run: |
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          TAG=${{ env.IMAGE_TAG }}

          declare -A SERVICE_TASK=(
            [genomaflow-api]="genomaflowecsApiTask"
            [genomaflow-worker]="genomaflowecsWorkerTask"
            [genomaflow-web]="genomaflowecsWebTask"
          )
          declare -A SERVICE_IMAGE=(
            [genomaflow-api]="$ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/genomaflow/api:$TAG"
            [genomaflow-worker]="$ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/genomaflow/worker:$TAG"
            [genomaflow-web]="$ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/genomaflow/web:$TAG"
          )

          for svc in genomaflow-api genomaflow-worker genomaflow-web; do
            FAMILY_PREFIX="${SERVICE_TASK[$svc]}"
            NEW_IMAGE="${SERVICE_IMAGE[$svc]}"

            # Get current task definition family name
            TASK_DEF_ARN=$(aws ecs describe-services \
              --cluster genomaflow --services $svc \
              --query 'services[0].taskDefinition' --output text)

            FAMILY=$(aws ecs describe-task-definition \
              --task-definition "$TASK_DEF_ARN" \
              --query 'taskDefinition.family' --output text)

            # Build jq filter — base: drop metadata, set new image.
            # For API: also upsert env vars que vieram de infra (SES + FRONTEND_URL).
            # "Upsert" = remove qualquer entrada com o mesmo nome e reinserir com valor novo.
            JQ_FILTER='del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy) | .containerDefinitions[0].image = $img'
            JQ_ARGS=(--arg img "$NEW_IMAGE")

            if [ "$svc" = "genomaflow-api" ]; then
              JQ_FILTER="$JQ_FILTER | .containerDefinitions[0].environment |= (
                map(select(.name != \$ses_name and .name != \$fe_name)) +
                [{name:\$ses_name,value:\$ses_val},{name:\$fe_name,value:\$fe_val}]
              )"
              JQ_ARGS+=(
                --arg ses_name "SES_FROM_EMAIL" --arg ses_val "noreply@genomaflow.com.br"
                --arg fe_name  "FRONTEND_URL"    --arg fe_val  "https://genomaflow.com.br"
              )
            fi

            NEW_TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "$TASK_DEF_ARN" \
              --query 'taskDefinition' --output json | \
              jq "${JQ_ARGS[@]}" "$JQ_FILTER")

            NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            echo "$svc → new task def: $NEW_TASK_DEF_ARN"

            aws ecs update-service \
              --cluster genomaflow \
              --service $svc \
              --task-definition "$NEW_TASK_DEF_ARN" \
              --query 'service.serviceName' --output text
          done

      - name: Run migrations
        run: |
          CLUSTER="genomaflow"

          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix genomaflow-prod-migrate \
            --sort DESC \
            --query "taskDefinitionArns[0]" \
            --output text)
          echo "Task def: $TASK_DEF"

          SUBNET=$(aws cloudformation describe-stacks \
            --stack-name genomaflow-vpc \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicSubnet1`].OutputValue' \
            --output text)
          SG=$(aws cloudformation describe-stacks \
            --stack-name genomaflow-vpc \
            --query 'Stacks[0].Outputs[?OutputKey==`SgEcsId`].OutputValue' \
            --output text)
          echo "Subnet: $SUBNET | SG: $SG"

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration \
              "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --query "tasks[0].taskArn" \
            --output text)
          echo "Migration task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "❌ Migration falhou (exit $EXIT_CODE)"
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name /genomaflow/prod \
              --log-stream-name "migrate/migrate/$TASK_ID" \
              --query 'events[*].message' --output text || true
            exit 1
          fi
          echo "✅ Migration concluída"

      - name: Reindex Copilot product-help docs (if docs/ changed)
        run: |
          CLUSTER="genomaflow"

          # Detectar mudanças em docs/, CLAUDE.md, ou no próprio indexer neste push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -E "^(docs/|CLAUDE\.md|apps/worker/src/rag/)" | head -5 || true)
          if [ -z "$CHANGED" ]; then
            echo "Sem mudanças em docs/ — skip reindex"
            exit 0
          fi
          echo "Docs mudaram:"
          echo "$CHANGED"

          # Task def do reindex (criado via CDK, família genomaflow-prod-reindex-help)
          TASK_DEF=$(aws ecs list-task-definitions \
            --family-prefix genomaflow-prod-reindex-help \
            --sort DESC \
            --query "taskDefinitionArns[0]" \
            --output text)

          if [ "$TASK_DEF" = "None" ] || [ -z "$TASK_DEF" ]; then
            echo "⚠️ Task def genomaflow-prod-reindex-help ainda não existe no ECS."
            echo "   Rodar manualmente: cd infra && npx cdk deploy genomaflow-ecs"
            echo "   Pulando reindex nesse deploy (docs ficam defasados até o cdk deploy)."
            exit 0
          fi

          SUBNET=$(aws cloudformation describe-stacks \
            --stack-name genomaflow-vpc \
            --query 'Stacks[0].Outputs[?OutputKey==`PublicSubnet1`].OutputValue' \
            --output text)
          SG=$(aws cloudformation describe-stacks \
            --stack-name genomaflow-vpc \
            --query 'Stacks[0].Outputs[?OutputKey==`SgEcsId`].OutputValue' \
            --output text)

          TASK_ARN=$(aws ecs run-task \
            --cluster "$CLUSTER" \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration \
              "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --query "tasks[0].taskArn" \
            --output text)
          echo "Reindex task: $TASK_ARN"

          aws ecs wait tasks-stopped --cluster "$CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "$CLUSTER" --tasks "$TASK_ARN" \
            --query "tasks[0].containers[0].exitCode" \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "⚠️ Reindex falhou (exit $EXIT_CODE) — deploy segue, mas Copilot terá docs defasados"
            TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
            aws logs get-log-events \
              --log-group-name /genomaflow/prod \
              --log-stream-name "reindex/reindex/$TASK_ID" \
              --query 'events[*].message' --output text || true
            # Não falhar o deploy por causa de reindex — Copilot continua funcional com docs anteriores
            exit 0
          fi
          echo "✅ Reindex concluído"

      - name: Wait for services stable
        run: |
          for i in $(seq 1 24); do
            PENDING=$(aws ecs describe-services \
              --cluster genomaflow \
              --services genomaflow-api genomaflow-web \
              --query 'services[*].pendingCount' \
              --output text | tr '\t' '\n' | awk '{s+=$1} END {print s}')
            RUNNING=$(aws ecs describe-services \
              --cluster genomaflow \
              --services genomaflow-api genomaflow-web \
              --query 'services[*].runningCount' \
              --output text | tr '\t' '\n' | awk '{s+=$1} END {print s}')
            echo "Check $i: running=$RUNNING pending=$PENDING"
            if [ "$PENDING" = "0" ] && [ "$RUNNING" = "2" ]; then
              echo "✅ Serviços estáveis"
              exit 0
            fi
            sleep 30
          done
          echo "⚠️ Timeout — serviços ainda convergindo, mas deploy foi aplicado"
